{% extends "base.html" %}

{% block title %}Job Title Analytics - Job Market Intelligence{% endblock %}

{% block content %}
<h2 style="margin-bottom: 2rem; color: #1f2937;">💼 Job Title Analytics</h2>

<div class="card">
    <h3 style="margin-bottom: 1rem; color: #1f2937;">📊 Top 30 Job Titles</h3>
    <canvas id="titlesChart"></canvas>
</div>

<div class="card" style="margin-top: 2rem;">
    <h3 style="margin-bottom: 1rem; color: #1f2937;">📋 Detailed Breakdown</h3>
    <table id="titlesTable" class="data-table" style="width: 100%;">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Job Title</th>
                <th>Job Count</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="4" style="text-align: center; padding: 2rem;">
                    <div class="loading-spinner"></div>
                    <p style="color: #6b7280; margin-top: 1rem;">Loading title data...</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<style>
    .loading-spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid #f3f4f6;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    .data-table {
        width: 100%;
    }
    
    .data-table th {
        background: #f9fafb;
        color: #1f2937;
        padding: 0.75rem;
        text-align: left;
        font-weight: 600;
        font-size: 0.875rem;
    }
    
    .data-table td {
        padding: 0.75rem;
        border-bottom: 1px solid #e5e7eb;
        font-size: 0.875rem;
    }
    
    .data-table tr:hover {
        background: #f9fafb;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let titlesChart = null;

document.addEventListener('DOMContentLoaded', function() {
    loadTitles();
});

function loadTitles() {
    fetch('/api/titles/top')
        .then(response => response.json())
        .then(titles => {
            renderTitlesChart(titles);
            renderTitlesTable(titles);
        })
        .catch(error => {
            console.error('Error loading titles:', error);
            document.querySelector('#titlesTable tbody').innerHTML = 
                '<tr><td colspan="4" style="text-align: center; color: #ef4444; padding: 2rem;">Error loading title data</td></tr>';
        });
}

function renderTitlesChart(titles) {
    const ctx = document.getElementById('titlesChart').getContext('2d');

    if (titlesChart) {
        titlesChart.destroy();
    }

    const top = titles.slice(0, 15);
    // Size canvas to fit all bars (32px per bar + padding)
    ctx.canvas.style.height = (top.length * 32 + 60) + 'px';

    titlesChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: top.map(t => t.title.length > 40 ? t.title.substring(0, 37) + '...' : t.title),
            datasets: [{
                label: 'Job Count',
                data: top.map(t => t.count),
                backgroundColor: '#667eea',
                borderWidth: 0
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        title: function(context) {
                            return titles[context[0].dataIndex].title;
                        }
                    }
                }
            },
            scales: {
                x: { beginAtZero: true },
                y: {
                    ticks: {
                        autoSkip: false
                    }
                }
            }
        }
    });
}

function renderTitlesTable(titles) {
    const tbody = document.querySelector('#titlesTable tbody');
    
    if (titles.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #6b7280; padding: 2rem;">No titles found</td></tr>';
        return;
    }
    
    tbody.innerHTML = titles.map((title, index) => `
        <tr>
            <td><strong>#${index + 1}</strong></td>
            <td>${title.title}</td>
            <td>${title.count} jobs</td>
            <td>
                <a href="/jobs?search=${encodeURIComponent(title.title)}" 
                   class="btn" 
                   style="padding: 0.25rem 0.75rem; font-size: 0.75rem; background: #667eea; color: white; text-decoration: none; border-radius: 4px;">
                    View Jobs
                </a>
            </td>
        </tr>
    `).join('');
}
</script>
{% endblock %}
