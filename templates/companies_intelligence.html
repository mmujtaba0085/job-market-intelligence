{% extends "base.html" %}

{% block title %}Company Intelligence - Job Market Intelligence{% endblock %}

{% block content %}
<h2 style="margin-bottom: 2rem; color: #1f2937;">🏢 Company Intelligence</h2>

<div class="card">
    <table id="companiesTable" class="data-table" style="width: 100%;">
        <thead>
            <tr>
                <th>Company</th>
                <th>Jobs Posted</th>
                <th>Skill Diversity</th>
                <th>Locations</th>
                <th>Remote %</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="6" style="text-align: center; padding: 2rem;">
                    <div class="loading-spinner"></div>
                    <p style="color: #6b7280; margin-top: 1rem;">Loading company data...</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<style>
    .loading-spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid #f3f4f6;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    .data-table {
        width: 100%;
    }
    
    .data-table th {
        background: #f9fafb;
        color: #1f2937;
        padding: 0.75rem;
        text-align: left;
        font-weight: 600;
        font-size: 0.875rem;
    }
    
    .data-table td {
        padding: 0.75rem;
        border-bottom: 1px solid #e5e7eb;
        font-size: 0.875rem;
    }
    
    .data-table tr:hover {
        background: #f9fafb;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadCompanies();
});

function loadCompanies() {
    fetch('/api/companies/list')
        .then(response => response.json())
        .then(companies => {
            const tbody = document.querySelector('#companiesTable tbody');
            
            if (companies.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #6b7280; padding: 2rem;">No companies found</td></tr>';
                return;
            }
            
            tbody.innerHTML = companies.map(company => `
                <tr>
                    <td><strong>${company.company}</strong></td>
                    <td>${company.job_count} jobs</td>
                    <td>${company.skill_diversity} skills</td>
                    <td>${company.location_count} countries</td>
                    <td>${company.remote_pct}%</td>
                    <td>
                        <a href="/jobs?company=${encodeURIComponent(company.company)}" 
                           class="btn" 
                           style="padding: 0.25rem 0.75rem; font-size: 0.75rem; background: #667eea; color: white; text-decoration: none; border-radius: 4px;">
                            View Jobs
                        </a>
                    </td>
                </tr>
            `).join('');
        })
        .catch(error => {
            console.error('Error loading companies:', error);
            document.querySelector('#companiesTable tbody').innerHTML = 
                '<tr><td colspan="6" style="text-align: center; color: #ef4444; padding: 2rem;">Error loading company data</td></tr>';
        });
}
</script>
{% endblock %}
