{% extends "base.html" %}
{% import "_icons.html" as icons %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div style="max-width:440px;margin:0 auto;">
    <div class="page-header">
        <h2 style="display:flex;align-items:center;gap:8px;">{{ icons.lock(19) }} Change password</h2>
    </div>

    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label class="form-label" style="text-transform:none;letter-spacing:normal;font-weight:500;">Current password</label>
                <input class="form-control" type="password" name="current_password" required>
            </div>
            <div class="form-group">
                <label class="form-label" style="text-transform:none;letter-spacing:normal;font-weight:500;">New password (min 8 chars)</label>
                <input class="form-control" type="password" name="new_password" required minlength="8">
            </div>
            <div class="form-group">
                <label class="form-label" style="text-transform:none;letter-spacing:normal;font-weight:500;">Confirm new password</label>
                <input class="form-control" type="password" name="confirm_password" required>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                <a href="/auth/me/keys" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Update password</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
