<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Job Market Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root,[data-theme="dark"]{--bg-base:#0d1117;--bg-surface:#161b22;--bg-elevated:#21262d;--border:#30363d;--text-primary:#e6edf3;--text-secondary:#8b949e;--accent:#58a6ff;--accent-hover:#79b8ff;--accent-bg:rgba(88,166,255,0.1);--danger:#f85149;--danger-bg:rgba(248,81,73,0.12);--success:#3fb950;--success-bg:rgba(63,185,80,0.12);--purple:#bc8cff;--purple-bg:rgba(188,140,255,0.12);}
        [data-theme="light"]{--bg-base:#f6f8fa;--bg-surface:#ffffff;--bg-elevated:#f0f3f7;--border:#d0d7de;--text-primary:#1f2328;--text-secondary:#57606a;--accent:#0969da;--accent-hover:#0550ae;--accent-bg:rgba(9,105,218,0.07);--danger:#cf222e;--danger-bg:rgba(207,34,46,0.08);--success:#1a7f37;--success-bg:rgba(26,127,55,0.08);--purple:#8250df;--purple-bg:rgba(130,80,223,0.08);}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;color:var(--text-primary);background:var(--bg-base);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    </style>
    <style>
        .login-wrap {
            width: 100%;
            max-width: 400px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(88,166,255,0.25);
        }

        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .brand-sub {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .login-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }

        .error-box {
            padding: 10px 14px;
            background: var(--danger-bg);
            border: 1px solid var(--danger);
            border-radius: 8px;
            color: var(--danger);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-top: 8px;
        }

        .btn-login:hover { opacity: 0.88; }

        .api-info {
            margin-top: 20px;
            padding: 14px;
            background: var(--bg-elevated);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .api-info-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .api-info code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            background: var(--bg-base);
            padding: 3px 7px;
            border-radius: 4px;
            display: block;
            margin-bottom: 4px;
        }

        .theme-btn {
            position: fixed;
            top: 16px; right: 16px;
            width: 36px; height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-primary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">🌙</button>

    <div class="login-wrap">
        <div class="login-brand">
            <div class="brand-logo">📊</div>
            <div class="brand-name">Job Market Intelligence</div>
            <div class="brand-sub">Sign in to access the dashboard</div>
        </div>

        <div class="login-card">
            <div class="login-title">Sign In</div>

            {% if error %}
            <div class="error-box">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-control" type="text" id="username" name="username"
                           placeholder="Enter username" autocomplete="username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" type="password" id="password" name="password"
                           placeholder="Enter password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="api-info">
                <div class="api-info-title">API Access</div>
                <code>X-API-Key: jmi_&lt;your-key&gt;</code>
                <code>Authorization: Bearer jmi_&lt;your-key&gt;</code>
                <p style="font-size:11px;color:var(--text-secondary);margin-top:6px;">
                    API keys can be generated from your profile after signing in.
                </p>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const saved=document.cookie.match(/jmi_theme=([^;]+)/)?.[1];
            const theme=saved||"dark";
            document.documentElement.setAttribute("data-theme",theme);
            const btn=document.getElementById("themeToggle");
            if(btn)btn.textContent=theme==="dark"?"☀️":"🌙";
        })();

        window.toggleTheme=function(){
            const html=document.documentElement;
            const cur=html.getAttribute("data-theme");
            const next=cur==="dark"?"light":"dark";
            html.setAttribute("data-theme",next);
            document.cookie=`jmi_theme=${next};path=/;max-age=31536000;SameSite=Lax`;
            const btn=document.getElementById("themeToggle");
            if(btn)btn.textContent=next==="dark"?"☀️":"🌙";
        };
    </script>
</body>
</html>
