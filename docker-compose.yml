services:
  web:
    build: .
    container_name: jobmarket-web
    restart: unless-stopped
    env_file:
      - ${JOBMARKET_HOME:-.}/.env
    environment:
      GOOGLE_SA_JSON_PATH: /run/secrets/google-sa.json
      # Auth DB lives in the same data volume as jobs.sqlite
      AUTH_DB_PATH: data/auth.sqlite
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ${JOBMARKET_HOME:-.}/data:/app/data
      - ${JOBMARKET_HOME:-.}/outputs:/app/outputs
      - ${JOBMARKET_HOME:-.}/logs:/app/logs
      - ${JOBMARKET_HOME:-.}/secrets/google-sa.json:/run/secrets/google-sa.json:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  pipeline:
    build: .
    container_name: jobmarket-pipeline
    profiles: ["jobs"]
    env_file:
      - ${JOBMARKET_HOME:-.}/.env
    environment:
      GOOGLE_SA_JSON_PATH: /run/secrets/google-sa.json
      AUTH_DB_PATH: data/auth.sqlite
    volumes:
      - ${JOBMARKET_HOME:-.}/data:/app/data
      - ${JOBMARKET_HOME:-.}/outputs:/app/outputs
      - ${JOBMARKET_HOME:-.}/logs:/app/logs
      - ${JOBMARKET_HOME:-.}/secrets/google-sa.json:/run/secrets/google-sa.json:ro
    command: ["python", "-m", "src.orchestrator", "--mode", "ingest-only"]
    restart: "no"
